name: coverage

on:
  push:
    branches:
      - master
    paths:
      - "**.sol"
      - "**.ts"
      - "**.yml"
      - "**.json"

jobs:
  start:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run linter

      - name: Run coverage
        run: npm run coverage
